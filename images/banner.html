<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Image</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .banner {
            width: 1200px;
            height: 400px;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .banner h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .banner p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: 500;
        }
        .btn:hover {
            background-color: #3182ce;
        }
    </style>
</head>
<body>
    <div class="banner">
        <h1>中羽在线</h1>
        <p>羽毛球垂直门户与互动社区</p>
        <a href="index.html" class="btn">开始探索</a>
    </div>
</body>
</html>
